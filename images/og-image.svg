<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0E12"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="rgba(244,245,247,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C6FF00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C6FF00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Corner accents -->
  <line x1="0"    y1="1"   x2="180" y2="1"   stroke="rgba(198,255,0,0.22)" stroke-width="1"/>
  <line x1="1"    y1="0"   x2="1"   y2="180" stroke="rgba(198,255,0,0.22)" stroke-width="1"/>
  <line x1="1200" y1="629" x2="1020" y2="629" stroke="rgba(198,255,0,0.22)" stroke-width="1"/>
  <line x1="1199" y1="630" x2="1199" y2="450" stroke="rgba(198,255,0,0.22)" stroke-width="1"/>

  <!-- Logo mark — centered left block -->
  <g transform="translate(160, 255)">
    <line x1="0"  y1="0"   x2="90" y2="57" stroke="#C6FF00" stroke-width="7" stroke-linecap="round"/>
    <line x1="0"  y1="114" x2="90" y2="57" stroke="#C6FF00" stroke-width="7" stroke-linecap="round"/>
    <line x1="36" y1="0"   x2="90" y2="57" stroke="#C6FF00" stroke-width="3.5" stroke-linecap="round" opacity="0.28"/>
    <line x1="36" y1="114" x2="90" y2="57" stroke="#C6FF00" stroke-width="3.5" stroke-linecap="round" opacity="0.28"/>
  </g>

  <!-- Wordmark -->
  <text
    x="290" y="303"
    font-family="'Exo 2', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="96"
    letter-spacing="18"
    fill="#F4F5F7"
  >VORDROS</text>

  <!-- Tagline -->
  <text
    x="291" y="358"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="5"
    fill="rgba(198,255,0,0.65)"
  >AT THE CORE OF MOTION</text>

  <!-- Divider line -->
  <line x1="291" y1="386" x2="870" y2="386" stroke="rgba(244,245,247,0.10)" stroke-width="0.5"/>

  <!-- URL -->
  <text
    x="291" y="418"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="18"
    letter-spacing="2"
    fill="rgba(244,245,247,0.28)"
  >vordros.com</text>
</svg>
